<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;800&family=JetBrains+Mono:wght@400;700&family=Noto+Serif+SC:wght@400;600;700&display=swap');

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #e8e6df;
            color: #1A1A1A;
            font-family: 'Noto Serif SC', serif;
        }

        .container {
            position: relative;
            width: {{ poster_width | default(800) }}px;
            background: #F9F9F6;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4), 0 10px 30px rgba(0,10,20,0.3);
        }

        .content {
            position: relative;
            padding: 60px 50px 60px;
        }

        h1 {
            margin: 0 0 30px;
            color: #000;
            font-size: 36px;
            line-height: 1.3;
            font-weight: 700;
            letter-spacing: 0.01em;
        }

        .author-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 34px;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 999px;
            object-fit: cover;
            border: 1px solid #E8E6D9;
            background: #ece9df;
            flex-shrink: 0;
        }

        .author-meta {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .author-name {
            color: #333;
            font-family: 'Inter', sans-serif;
            font-size: 22px;
            font-weight: 400;
        }

        .publish-date {
            color: #888;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 300;
        }

        .article-content,
        .article-content p,
        .article-content li {
            font-size: 20px;
            line-height: 2;
            font-weight: 400;
            color: #1A1A1A;
        }

        .article-content p { margin: 0 0 20px; }

        .article-content h2 {
            margin: 40px 0 20px;
            font-size: 26px;
            line-height: 1.4;
            color: #000;
            font-weight: 700;
        }

        .article-content h3 {
            margin: 30px 0 15px;
            font-size: 22px;
            line-height: 1.45;
            color: #2c3e50;
            font-weight: 600;
        }

        .article-content ul, .article-content ol {
            margin: 0 0 20px;
            padding-left: 20px;
        }

        .article-content li { margin-bottom: 8px; }

        .article-content a {
            color: #4a9eff;
            text-decoration: none;
        }

        .article-content strong { font-weight: 700; }

        .article-content blockquote {
            margin: 20px 0;
            padding-left: 20px;
            border-left: 4px solid #4a9eff;
            font-style: italic;
        }

        .article-content pre {
            margin: 20px 0;
            padding: 20px;
            overflow-x: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 17px;
            line-height: 1.6;
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
        }

        .article-content code {
            font-family: 'JetBrains Mono', monospace;
            background: #f5f5f5;
            border-radius: 4px;
            padding: 2px 6px;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <h1>{{ title }}</h1>
            <div class="author-row">
                {% if avatar_url %}
                <img class="avatar" src="{{ avatar_url }}" alt="{{ author_name }}">
                {% else %}
                <div class="avatar"></div>
                {% endif %}
                <div class="author-meta">
                    <div class="author-name">{{ author_name }}</div>
                    <div class="publish-date">{{ date }}</div>
                </div>
            </div>
            <div class="article-content">
                {{ content_html | safe }}
            </div>
        </div>
    </div>
</body>
</html>
